<!DOCTYPE html>     <!--This is how you write comments-->
<html>              <!--html is given with open and close so the browser knows what version to use-->
    <head>          <!--Head is used to store metadata that isn't displayed directly on the web page -->                
        <title>Test Site</title>    <!--The title is used to give the site the name at the top in the browser tab-->
    </head>
    <body>
        <a href="./test2.html">To page 2</a>

    <div id="Headings"> <!--Div id is used if the div is used repetatively for easy access and reading-->
        <h1>Heading1 - Biggest</h1>
        <h6>Heading6 - Smallest</h6>
        <p>This is a paragraph. <strong>These words are strong</strong> and <em>these words are emphasized</em>.</p>
        <br />
        <p>The break line adds a gap</p>
    <div>
        <ul>
            <li>This</li>
            <li>is</li>
            <li>Unordered</li>
        </ul>
        <ol>
            <li>This</li>
            <li>is</li>
            <li>Ordered</li>
        </ol>
    </div>


    </div>
    <div id="Videos">
        <img src="https://content.codecademy.com/courses/web-101/web101-image_brownbear.jpg" alt="Brown bear"/>
        <video src="brown_bear_vid.mp4" width="320" height="240" controls></video>
    </div>

    <div id="Links"
     <a href="https://en.wikipedia.org/wiki/Brown_bear">Learn More</a>    <!--a means attribute, href is source, "learn more" is what shows up if the video can't load-->
    <a href="https://en.wikipedia.org/wiki/Brown_bear" target="_blank">The Brown Bear</a> <!--_blank means the window opens in a new tab-->
    <a href="https://en.wikipedia.org/wiki/Brown_bear" target="_blank"><img src="https://content.codecademy.com/courses/web-101/web101-image_brownbear.jpg" alt="Brown bear"
             </a    <!--The image is wrapped in an attribute, turning the image into a link-->
    </div>





    </body>
</html>
